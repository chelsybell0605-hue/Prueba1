<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hola Mundo Espacial</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #0b0f2a, #000000);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Estrellas */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
            box-shadow: 
                50px 80px white, 200px 150px white, 400px 300px white,
                600px 100px white, 800px 250px white, 1000px 50px white,
                1200px 200px white, 1400px 350px white;
            animation: estrellas 10s linear infinite;
        }

        @keyframes estrellas {
            from { transform: translateY(0); }
            to { transform: translateY(100px); }
        }

        .contenedor {
            position: relative;
            text-align: center;
            padding: 50px 70px;
            background: rgba(20, 20, 50, 0.7);
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.6);
            backdrop-filter: blur(10px);
            animation: aparecer 1.5s ease;
        }

        h1 {
            font-size: 3em;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 0 10px #00c3ff, 0 0 20px #00c3ff;
        }

        h1 span {
            color: #8be9fd;
            text-shadow: 0 0 15px #8be9fd;
        }

        .decoracion {
            margin-top: 15px;
            font-size: 1.5em;
            color: #ccc;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: scale(0.7);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1> Hola mundo <span>bonito</span> </h1>
        <div class="decoracion"> Explorando el universo </div>
    </div>

</body>
</html>
